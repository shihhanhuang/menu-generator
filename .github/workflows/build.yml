name: build

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      WATCHTOWER_TOKEN: ${{ secrets.WATCHTOWER_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/menu-generator:latest
      - name: Trigger deploy on rxtx.io
        if: ${{ env.WATCHTOWER_TOKEN != '' }}
        run: |
          curl -fsS -X POST -H "Authorization: Bearer ${WATCHTOWER_TOKEN}" \
            "https://watchtower.rxtx.io/v1/update"
